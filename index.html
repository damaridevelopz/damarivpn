<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DamariVPN</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Mono', monospace;
      background: #F5F0E8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #FDFAF4;
      border: 1px solid #D4CDB8;
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      padding: 2.5rem 2rem;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #3A7D5A; }
    .logo-text { font-size: 15px; font-weight: 700; color: #2A5C40; letter-spacing: 0.1em; }
    .logo-text span { color: #1A3C28; }
    .status-pill {
      font-size: 10px; letter-spacing: 0.08em;
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid #B3D4B0; background: #E0EDDF; color: #3A7D5A;
    }
    .status-pill.loading { background: #FFF5D9; border-color: #E0C96A; color: #8A6B00; }
    .status-pill.error { background: #FDECEA; border-color: #E8B4B0; color: #922B21; }
    .url-label { font-size: 10px; color: #8A8070; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .url-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .url-input {
      flex: 1; font-family: 'Space Mono', monospace; font-size: 13px;
      background: #EEE9DC; border: 1px solid #C8C2B0; border-radius: 10px;
      padding: 11px 14px; color: #2A2A22; outline: none; transition: border-color 0.2s;
    }
    .url-input:focus { border-color: #3A7D5A; }
    .url-input::placeholder { color: #A8A090; }
    .go-btn {
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; background: #2A5C40; color: #F5F0E8; border: none;
      border-radius: 10px; padding: 11px 20px; cursor: pointer;
      transition: background 0.2s, transform 0.1s; white-space: nowrap;
    }
    .go-btn:hover { background: #3A7D5A; }
    .go-btn:active { transform: scale(0.97); }
    .go-btn:disabled { background: #A8C4B0; cursor: not-allowed; }
    .quick-label { font-size: 10px; color: #8A8070; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 2rem; }
    .quick-btn {
      font-family: 'Space Mono', monospace; font-size: 11px;
      background: #EEE9DC; border: 1px solid #C8C2B0; border-radius: 10px;
      padding: 10px 12px; cursor: pointer; color: #2A2A22; text-align: left;
      transition: background 0.15s, border-color 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .quick-btn:hover { background: #DED9CC; border-color: #3A7D5A; }
    .quick-icon { font-size: 14px; }
    .quick-name { font-weight: 700; font-size: 11px; color: #2A5C40; }
    .quick-desc { font-size: 9px; color: #8A8070; margin-top: 1px; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 2rem; }
    .stat-box { background: #EEE9DC; border-radius: 10px; padding: 10px 8px; text-align: center; }
    .stat-val { font-size: 13px; font-weight: 700; color: #2A5C40; }
    .stat-key { font-size: 9px; color: #8A8070; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
    .error-box {
      display: none; background: #FDECEA; border: 1px solid #E8B4B0;
      border-radius: 10px; padding: 12px 14px; font-size: 12px; color: #922B21; margin-bottom: 1.25rem;
    }
    .footer {
      border-top: 1px solid #D4CDB8; padding-top: 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-text { font-size: 10px; color: #A8A090; letter-spacing: 0.05em; }
    .shield-icon { width: 14px; height: 14px; fill: #3A7D5A; opacity: 0.6; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-text">DAMARI<span>VPN</span></div>
    </div>
    <div class="status-pill" id="statusPill">● READY</div>
  </div>

  <div class="url-label">Enter URL to Browse</div>
  <div class="url-row">
    <input class="url-input" id="urlInput" type="text" placeholder="e.g. bbc.com, wikipedia.org..." />
    <button class="go-btn" id="goBtn" onclick="browse()">BROWSE</button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="quick-label">Quick Access</div>
  <div class="quick-grid">
    <button class="quick-btn" onclick="loadQuick('https://www.bbc.com')">
      <span class="quick-icon">📺</span>
      <div><div class="quick-name">BBC News</div><div class="quick-desc">UK news & media</div></div>
    </button>
    <button class="quick-btn" onclick="loadQuick('https://www.reddit.com')">
      <span class="quick-icon">💬</span>
      <div><div class="quick-name">Reddit</div><div class="quick-desc">Forums & communities</div></div>
    </button>
    <button class="quick-btn" onclick="loadQuick('https://www.wikipedia.org')">
      <span class="quick-icon">📖</span>
      <div><div class="quick-name">Wikipedia</div><div class="quick-desc">Free encyclopedia</div></div>
    </button>
    <button class="quick-btn" onclick="loadQuick('https://news.ycombinator.com')">
      <span class="quick-icon">🔗</span>
      <div><div class="quick-name">Hacker News</div><div class="quick-desc">Tech news</div></div>
    </button>
    <button class="quick-btn" onclick="loadQuick('https://www.aljazeera.com')">
      <span class="quick-icon">🌍</span>
      <div><div class="quick-name">Al Jazeera</div><div class="quick-desc">World news</div></div>
    </button>
    <button class="quick-btn" onclick="loadQuick('https://www.duckduckgo.com')">
      <span class="quick-icon">🔍</span>
      <div><div class="quick-name">DuckDuckGo</div><div class="quick-desc">Private search</div></div>
    </button>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="statRequests">0</div>
      <div class="stat-key">REQUESTS</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statTime">—</div>
      <div class="stat-key">LAST MS</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statStatus">IDLE</div>
      <div class="stat-key">STATUS</div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">DAMARIVPN — PERSONAL USE</span>
    <svg class="shield-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/>
    </svg>
  </div>
</div>

<script>
  let requests = 0;
  const urlInput = document.getElementById('urlInput');
  const goBtn = document.getElementById('goBtn');
  const statusPill = document.getElementById('statusPill');
  const errorBox = document.getElementById('errorBox');

  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') browse(); });
  function loadQuick(url) { urlInput.value = url; browse(); }

  async function browse() {
    let url = urlInput.value.trim();
    if (!url) return;
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

    setLoading(true);
    hideError();
    const start = Date.now();

    try {
      const res = await fetch('/fetch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const elapsed = Date.now() - start;

      if (!res.ok) {
        let msg = 'Server error ' + res.status;
        try {
          const ct = res.headers.get('content-type') || '';
          if (ct.includes('application/json')) {
            const j = await res.json();
            msg = j.error || msg;
          }
        } catch {}
        throw new Error(msg);
      }

      const html = await res.text();
      requests++;
      document.getElementById('statRequests').textContent = requests;
      document.getElementById('statTime').textContent = elapsed + 'ms';
      document.getElementById('statStatus').textContent = 'OK';

      // Navigate to /proxy?url= so links work correctly
      window.location.href = '/proxy?url=' + encodeURIComponent(url);

    } catch (err) {
      setLoading(false);
      showError(err.message);
      document.getElementById('statStatus').textContent = 'ERR';
      setStatus('● ERROR', 'error');
    }
  }

  function setLoading(on) {
    goBtn.disabled = on;
    goBtn.textContent = on ? '...' : 'BROWSE';
    if (on) setStatus('● LOADING', 'loading');
  }
  function setStatus(text, type) {
    statusPill.textContent = text;
    statusPill.className = 'status-pill' + (type && type !== 'default' ? ' ' + type : '');
  }
  function showError(msg) { errorBox.textContent = '⚠ ' + msg; errorBox.style.display = 'block'; }
  function hideError() { errorBox.style.display = 'none'; }
</script>
</body>
</html>
